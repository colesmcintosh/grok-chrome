name: Bug Report
description: Report a reproducible problem.
title: "Bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Include the page type and the prompt you used. Do not include secrets or private page content.
      placeholder: |
        1. Open ...
        2. Ask ...
        3. Approve ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: input
    id: chrome
    attributes:
      label: Chrome Version
      placeholder: "e.g. 126.0.6478.127"
  - type: input
    id: extension
    attributes:
      label: Extension Version
      placeholder: "e.g. 0.1.0"
